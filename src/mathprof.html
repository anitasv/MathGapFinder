<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Gap Finder</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 0; }
        #quiz-container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        .title { font-weight: bold; font-size: 1.5em; color: #2c3e50; margin-bottom: 10px; }
        .statement { font-style: italic; margin: 15px 0; background: #f4f4f4; padding: 10px; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button { padding: 10px; text-align: left; cursor: pointer; border: 1px solid #3498db; background: #fff; border-radius: 4px; }
        button:hover { background: #3498db; color: #fff; }
        #score-board { margin-top: 20px; font-weight: bold; }
        #course-scores { margin-top: 15px; font-size: 0.95em; }
        #course-scores table { border-collapse: collapse; width: 100%; margin-top: 8px; }
        #course-scores th, #course-scores td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
        #course-scores th { background: #f0f0f0; }
        .level-row { margin: 10px 0; cursor: pointer; user-select: none; }
        .level-header { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .level-name { min-width: 130px; }
        .level-bar { flex: 1; height: 16px; background: #eee; border-radius: 8px; overflow: hidden; position: relative; }
        .level-bar-fill { height: 100%; background: linear-gradient(90deg, #3498db, #2ecc71); transition: width 0.3s; }
        .level-stats { min-width: 140px; text-align: right; font-weight: normal; font-size: 0.9em; color: #555; }
        .level-caret { width: 14px; display: inline-block; transition: transform 0.2s; }
        .level-caret.open { transform: rotate(90deg); }
        .level-detail { margin: 6px 0 0 28px; display: none; }
        .level-detail.open { display: block; }
        .course-row { display: flex; align-items: center; gap: 10px; margin: 4px 0; font-size: 0.9em; }
        .course-name { min-width: 220px; }
        .course-bar { flex: 1; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; }
        .course-bar-fill { height: 100%; background: #3498db; }
        .course-stats { min-width: 140px; text-align: right; color: #555; }
        .course-name.clickable { cursor: pointer; color: #2980b9; text-decoration: underline dotted; }
        .course-name.clickable:hover { color: #1c5980; }
        .ref-detail { margin: 4px 0 10px 232px; padding: 10px 12px; background: #f8fbfd; border-left: 3px solid #2980b9; border-radius: 4px; font-size: 0.9em; }
        .ref-detail h4 { margin: 0 0 4px 0; font-size: 0.95em; color: #2c3e50; }
        .ref-detail ul { margin: 4px 0 8px 18px; padding: 0; }
        .ref-detail a { color: #2980b9; }
        .course-tag { display: inline-block; margin-top: 6px; color: #555; font-size: 0.9em; }
        .course-tag .course-link { color: #2980b9; cursor: pointer; text-decoration: underline dotted; }
        #inline-refs { margin-top: 8px; }
        .nav { display: flex; justify-content: space-between; margin-top: 15px; }
        .nav button { min-width: 100px; }
        .nav button:disabled { opacity: 0.5; cursor: not-allowed; }
        button.selected { background: #3498db; color: #fff; font-weight: bold; }
        .proof-hint { margin-top: 15px; font-size: 0.95em; }
        .proof-hint summary { cursor: pointer; color: #2980b9; user-select: none; display: inline-block; padding: 4px 8px; border: 1px solid #2980b9; border-radius: 4px; background: #f8fbfd; }
        .proof-hint summary:hover { background: #2980b9; color: #fff; }
        .proof-hint[open] summary { background: #2980b9; color: #fff; }
        .proof-hint .hint-body { margin-top: 8px; padding: 10px; background: #fffbe6; border-left: 3px solid #f1c40f; border-radius: 4px; }
        .tagline { font-size: 0.85em; color: #666; font-style: italic; margin: -8px 0 14px 2px; }
        .header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .header h1 { margin: 0.67em 0; }
        .github-link { color: #2c3e50; text-decoration: none; flex-shrink: 0; }
        .github-link:hover { color: #2980b9; }
        .github-link svg { display: block; width: 32px; height: 32px; }
        #share-box { margin-top: 20px; padding: 14px 16px; background: #f8fbfd; border: 1px solid #d6e6f2; border-radius: 6px; }
        #share-box h3 { margin: 0 0 8px 0; font-size: 1.05em; color: #2c3e50; }
        #share-box .share-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        #share-box .share-buttons button, #share-box .share-buttons a { padding: 8px 12px; font-size: 0.9em; border: 1px solid #2980b9; background: #fff; color: #2980b9; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; }
        #share-box .share-buttons button:hover, #share-box .share-buttons a:hover { background: #2980b9; color: #fff; }
        #share-status { margin-left: 8px; font-size: 0.85em; color: #27ae60; }
        body.share-view #score-board,
        body.share-view #restart-row { display: none; }
        #share-box .share-name-row { margin-top: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 0.9em; }
        #share-box .share-name-row input { padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95em; min-width: 180px; }
        a.try-yourself-btn { display: inline-block; margin: 4px 0 12px 2px; padding: 6px 10px; font-size: 0.85em; border: 1px solid #2980b9; background: #fff; color: #2980b9; border-radius: 4px; text-decoration: none; }
        a.try-yourself-btn:hover { background: #2980b9; color: #fff; }
    </style>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)'], ['$', '$']],
                displayMath: [['\\[', '\\]'], ['$$', '$$']]
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div class="header">
        <h1 style="cursor:pointer;" onclick="goTo(0)">Math Gap Finder</h1>
        <a href="https://github.com/anitasv/MathGapFinder" target="_blank" rel="noopener" class="github-link" title="View on GitHub" aria-label="View on GitHub">

        </a>
    </div>
    <div class="tagline">Discover your blind spots and chart your path through mathematics.</div>
    <div id="quiz-container">
        <div id="quiz-content">Loading theorems...</div>
    </div>
    <div id="score-board">Total Score: 0</div>
    <div id="restart-row" style="margin-top:10px;"><button onclick="restartQuiz()">↺ Restart</button></div>
    <div id="course-scores"></div>

        // Data file URLs. release.py rewrites these to hashed filenames.
        window.THEOREMS_URL = '../data/theorems.json';
        window.REFERENCES_URL = '../data/references.json';
    </script>
    <script src="mathprof.js"></script>
</body>
</html>
