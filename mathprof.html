<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Theorems</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; }
        .theorem { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        .title { font-weight: bold; font-size: 1.2em; color: #2c3e50; }
        .statement { font-style: italic; margin: 10px 0; }
        .example { background: #f9f9f9; padding: 10px; border-left: 3px solid #3498db; margin: 10px 0; white-space: pre-wrap; }
        .proof { margin-top: 10px; color: #555; }
    </style>
</head>
<body>
    <h1>Math Theorems</h1>
    <div id="theorems">Loading theorems...</div>

    <script>
        fetch('theorems.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('theorems');
                container.innerHTML = '';
                data.forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'theorem';
                    div.innerHTML = `
                        <div class="title">${t.id}. ${t.title}</div>
                        <div class="statement"><strong>Statement:</strong> ${t.statement}</div>
                        ${t.example ? `<div class="example"><strong>Example:</strong><br>${t.example}</div>` : ''}
                        <div class="proof"><strong>Proof structure:</strong> ${t.proof_structure}</div>
                    `;
                    container.appendChild(div);
                });
            })
            .catch(err => {
                document.getElementById('theorems').innerText = 'Error loading theorems: ' + err.message;
            });
    </script>
</body>
</html>
