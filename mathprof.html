<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Theorems Quiz</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; }
        #quiz-container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        .title { font-weight: bold; font-size: 1.5em; color: #2c3e50; margin-bottom: 10px; }
        .statement { font-style: italic; margin: 15px 0; background: #f4f4f4; padding: 10px; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button { padding: 10px; text-align: left; cursor: pointer; border: 1px solid #3498db; background: #fff; border-radius: 4px; }
        button:hover { background: #3498db; color: #fff; }
        #score-board { margin-top: 20px; font-weight: bold; }
    </style>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)'], ['$', '$']],
                displayMath: [['\\[', '\\]'], ['$$', '$$']]
            },
            svg: { fontCache: 'global' }
        };


    </script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <h1>Math Theorems Quiz</h1>
    <div id="quiz-container">
        <div id="quiz-content">Loading theorems...</div>
    </div>
    <div id="score-board">Total Score: 0</div>

    <script>
        let theorems = [];
        let currentIndex = 0;
        let totalScore = 0;

        // The source (Theorems.MD / theorems.json) uses pandoc-style math
        // delimiters: every (...) wraps inline math and every [...] wraps
        // display math. Convert them to MathJax delimiters \( \) and \[ \].
        // We scan top-level balanced groups so nested parens like
        // "(c\in(a,b))" are kept intact inside a single \( ... \) wrapper.
        function convertMathDelimiters(s) {
            if (!s) return s;
            let out = '';
            let i = 0;
            while (i < s.length) {
                const ch = s[i];
                if (ch === '(' || ch === '[') {
                    const open = ch;
                    const close = ch === '(' ? ')' : ']';
                    // Find matching close, tracking nesting of the same kind.
                    let depth = 1;
                    let j = i + 1;
                    while (j < s.length && depth > 0) {
                        if (s[j] === open) depth++;
                        else if (s[j] === close) depth--;
                        if (depth === 0) break;
                        j++;
                    }
                    if (depth === 0) {
                        const inner = s.slice(i + 1, j);
                        // Only treat as math if the contents have a LaTeX
                        // control sequence, a digit, or a math operator.
                        // Plain prose like "(in probability or almost surely)"
                        // should remain literal parentheses.
                        // Math iff contents contain a LaTeX control
                        // sequence (e.g. \frac, \mu, \in) or a digit.
                        // Otherwise it's plain prose like "(f)", "[a,b]",
                        // "(in probability or almost surely)".
                        // Math if contents contain a LaTeX control sequence
                        // (e.g. \frac, \mu, \in), a digit, curly braces, OR
                        // every alphabetic "word" is a single letter
                        // (e.g. "a,b", "f", "x y").
                        const hasControlOrNumOrBraces = /\\[a-zA-Z]+|\d|[{}]/.test(inner);
                        const words = inner.match(/[A-Za-z]+/g) || [];
                        const allSingleLetters = words.length > 0 &&
                            words.every(w => w.length === 1);
                        const isMath = hasControlOrNumOrBraces || allSingleLetters;
                        if (isMath) {
                            out += (open === '(' ? '\\(' : '\\[') + inner +
                                   (open === '(' ? '\\)' : '\\]');
                        } else {
                            out += open + inner + close;
                        }
                        i = j + 1;
                        continue;
                    }
                }
                out += ch;
                i++;
            }
            return out;
        }


        async function loadTheorems() {
            try {
                const response = await fetch('theorems.json');
                theorems = await response.json();
                renderTheorem();
            } catch (err) {
                document.getElementById('quiz-content').innerText = 'Error loading theorems: ' + err.message;
            }
        }

        function renderTheorem() {
            const container = document.getElementById('quiz-content');
            if (currentIndex >= theorems.length) {
                container.innerHTML = `<h2>Quiz Complete!</h2><p>Your final score is ${totalScore} out of ${theorems.length * 10}.</p>`;
                return;
            }

            const t = theorems[currentIndex];
            container.innerHTML = `
                <div class="title">${t.id}. ${t.title}</div>
                <div class="statement"><strong>Statement:</strong> ${convertMathDelimiters(t.statement)}</div>
                <div class="options">
                    <button onclick="handleAnswer(10)">A) Yes, I know theorem and proof. (10 points)</button>
                    <button onclick="handleAnswer(7)">B) No, but I can prove it. (7 points)</button>
                    <button onclick="handleAnswer(2)">C) I know theorem, but can't prove it. (2 points)</button>
                    <button onclick="handleAnswer(0)">D) No, I don't know theorem, and can't prove it. (0 points)</button>
                </div>
            `;

            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise([container]).catch((e) => console.error(e));
            }
        }

        function handleAnswer(points) {
            totalScore += points;
            currentIndex++;
            document.getElementById('score-board').innerText = 'Total Score: ' + totalScore;
            renderTheorem();
        }

        loadTheorems();
    </script>
</body>
</html>
